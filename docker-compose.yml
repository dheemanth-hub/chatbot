services:
  web:
    build: .
    command: sh -c "python manage.py migrate && python manage.py shell -c 'from django.contrib.auth import get_user_model; User = get_user_model(); u, created = User.objects.get_or_create(username=\"dheemanth\"); u.set_password(\"Dheemanth@252004\"); u.is_superuser = True; u.is_staff = True; u.is_active = True; u.save(); print(\"created\" if created else \"updated\")' && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DB: chatbotdb
      POSTGRES_USER: dheemanth
      POSTGRES_PASSWORD: Dheemanth@252004
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: chatbotdb
      POSTGRES_USER: dheemanth
      POSTGRES_PASSWORD: Dheemanth@252004
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
