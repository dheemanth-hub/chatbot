version: "3.9"

services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DB: chatbotdb
      POSTGRES_USER: dheemanth
      POSTGRES_PASSWORD: Dheemanth@252004
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: chatbotdb
      POSTGRES_USER: dheemanth
      POSTGRES_PASSWORD: Dheemanth@252004
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
